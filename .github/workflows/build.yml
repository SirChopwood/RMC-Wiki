name: Build SimpleWiki

on:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Generate static site
        run: npm run generate